# HTTP — redirect all to HTTPS + handle certbot challenges
server {
    listen 80;
    server_name stockagentify.com www.stockagentify.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to api-gateway
server {
    listen 443 ssl;
    http2 on;
    server_name stockagentify.com www.stockagentify.com;

    ssl_certificate     /etc/letsencrypt/live/stockagentify.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockagentify.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS for Vercel frontend
    add_header Access-Control-Allow-Origin  "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass         http://web:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /ai-search {
        proxy_pass http://172.18.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    location /webhook {
        proxy_pass http://172.17.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /signals {
        proxy_pass http://172.17.0.1:3001;
    }

    location /stream {
        proxy_pass http://172.17.0.1:3001;
        proxy_buffering off;
        proxy_cache off;
    }

    location /actuator {
        deny all;
    }
}

