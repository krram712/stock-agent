# HTTP — redirect all to HTTPS + handle certbot challenges
server {
    listen 80;
    server_name stockagentify.com www.stockagentify.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to api-gateway
server {
    listen 443 ssl;
    http2 on;
    server_name stockagentify.com www.stockagentify.com;

    ssl_certificate     /etc/letsencrypt/live/stockagentify.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stockagentify.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # NOTE: CORS is handled by Spring Cloud Gateway — do NOT add Access-Control-* headers here
    # to avoid duplicate header conflicts that break browser preflight checks.

    location /api/ {
        set $upstream_api http://api-gateway:8080;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        set $upstream_web http://web:80;
        proxy_pass         $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /ai-search {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }

    location /watchlist-analyze {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
    }

    location /webhook {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /signals {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
    }

    location /stream {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_cache        off;
        add_header         X-Accel-Buffering no;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /health {
        set $upstream_wh http://webhook-server:3001;
        proxy_pass         $upstream_wh;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /technical-api/ {
        set $upstream_tech http://technical-service:8084;
        proxy_pass         $upstream_tech/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /actuator {
        deny all;
    }
}
