version: '3.8'

services:
  # ─── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-axiom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: axiom
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-axiom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microservices ─────────────────────────────────────────────
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/axiom_users
      DB_USERNAME: ${POSTGRES_USER:-axiom}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  stock-data-service:
    build:
      context: ./backend
      dockerfile: stock-data-service/Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-demo}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-demo}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-demo}
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  analysis-service:
    build:
      context: ./backend
      dockerfile: analysis-service/Dockerfile
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/axiom_analysis
      DB_USERNAME: ${POSTGRES_USER:-axiom}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STOCK_DATA_SERVICE_URL: http://stock-data-service:8082
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      stock-data-service:
        condition: service_healthy
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    restart: always
    volumes:
      - ./backend/api-gateway/src/main/resources/application-prod.yml:/app/config/application-prod.yml:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8081
      STOCK_DATA_SERVICE_URL: http://stock-data-service:8082
      ANALYSIS_SERVICE_URL: http://analysis-service:8083
    depends_on:
      user-service:
        condition: service_healthy
      stock-data-service:
        condition: service_healthy
      analysis-service:
        condition: service_healthy
    networks:
      - axiom-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web Frontend ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://stockagentify.com
    restart: always
    networks:
      - axiom-net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/axiom-init.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api-gateway
    networks:
      - axiom-net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  axiom-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

