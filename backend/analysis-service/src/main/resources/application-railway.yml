spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8083}

stock-data-service:
  url: ${STOCK_DATA_SERVICE_URL}

anthropic:
  api-key: ${ANTHROPIC_API_KEY}

analysis:
  cache-ttl-minutes: 30

