spring:
  application:
    name: analysis-service
  datasource:
    url: jdbc:h2:mem:axiom_analysis;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

server:
  port: 8083

stock-data-service:
  url: http://localhost:8082

analysis:
  cache-ttl-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info

